<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Anonyme</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h3 class="section-title">Udvalgte værker</h3>
  <h1 class="index-titel">Klik på et værk</h1>

   <div class="glow"></div>

    <div class="scene">
        <div class="gallery"></div>
        
        <div class="carousel-controls">
            <button class="carousel-button prev" type="button" aria-label="Forrige"></button>
            <button class="carousel-button next" type="button" aria-label="Neste"></button>
        </div>

        <button class="stop-projection-btn is-hidden" type="button">
          X
        </button>
    </div>


    <div class="language-switch">

  <img
    src="img/united-kingdom-flag.png"
    alt="English"
    id="englishFlag"
  >

  <img
    src="img/denmark-flag.png"
    alt="Dansk"
    id="danishFlag"
  >

</div>

<div class="artgallery-btn">

  <button class="show-gallery-btn">
    Vis alle værker
  </button>

</div>


<div class="all-artworks">

  <button class="back-button">
    ← Tilbage
  </button>

  <h1 class="gallery-title">
    Alle værker
  </h1>

  <div class="art-grid"></div>

</div>
    <script src="js/screen.js"></script>

</body>
</html>
