<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="gallery">
        <div class="card1">
            <img src="img/frits-albert-florentinus-strand.png" alt="Frits Albert Florentinus Strands maleri" class="painting"> 
            <div class="card1-info">
                <span class="card1-name">Frits A.F. Strand</span>
                <span>1853-1936</span>
            </div>
        </div>
        
        <div class="card2">
            <img src="img/jette-hansen.png" alt="Jette Hansens maleri" class="painting">
            <div class="card2-info">
                <span class="card2-name">Jette Hansen</span>
                <span>1946-</span>
            </div>
        </div>

        <div class="card3">
            <img src="img/marie-heiberg.png" alt="Marie Heibergs maleri" class="painting">
            <div class="card3-info">
                <span class="card3-name">Marie Heiberg</span>
                <span>1942-2008</span>
            </div>
        </div>

        <div class="card4">
            <img src="img/ole-norge.png" alt="Ole Norges maleri" class="painting">
            <div class="card4-info">
                <span class="card4-name">Ole Norge</span>
                <span>1951-2012</span>
            </div>
        </div>

        <div class="card5">
            <img src="img/patrick-larsen.png" alt="Patrick Larsens maleri" class="painting">
            <div class="card5-info">
                <span class="card5-name">Patrick Larsen</span>
                <span>1951-1986</span>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
